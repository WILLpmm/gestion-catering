
<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="estilos.css"><title>Login</title>
<script>
function ingresar(){
 if(usuario.value.trim()==''||password.value.trim()==''){alert('Complete los datos');return;}
 location='menu.html';
}
</script></head>
<body class="login"><div class="card">
<h1 style="text-align:center;color:#2563eb">🍽️ Servicios de Catering</h1>
<p>Inicio de sesión</p>
<input id="usuario" placeholder="Usuario">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="ingresar()">Ingresar</button>
</div></body></html>
